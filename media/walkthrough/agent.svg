<svg xmlns="http://www.w3.org/2000/svg" width="200" height="120" viewBox="0 0 200 120">
  <rect x="10" y="20" width="180" height="80" rx="8" fill="var(--vscode-editor-background)" stroke="var(--vscode-widget-border)" stroke-width="1.5"/>
  <rect x="10" y="20" width="180" height="24" rx="8" fill="var(--vscode-titleBar-activeBackground)"/>
  <circle cx="24" cy="32" r="4" fill="var(--vscode-errorForeground)"/>
  <circle cx="36" cy="32" r="4" fill="var(--vscode-editorWarning-foreground)"/>
  <circle cx="48" cy="32" r="4" fill="var(--vscode-debugIcon-startForeground)"/>
  <text x="70" y="37" font-size="10" fill="var(--vscode-titleBar-activeForeground)" font-family="monospace" opacity="0.7">bash</text>
  <text x="24" y="58" font-size="10" fill="var(--vscode-textLink-foreground)" font-family="monospace">$ opencode agent create</text>
  <text x="24" y="73" font-size="10" fill="var(--vscode-editor-foreground)" font-family="monospace">? Name: my-agent</text>
  <text x="24" y="85" font-size="10" fill="var(--vscode-editor-foreground)" font-family="monospace">? What should the agent do?:</text>
  <text x="24" y="97" font-size="10" fill="var(--vscode-editor-foreground)" font-family="monospace">  Specializes in testing and QA</text>
</svg>