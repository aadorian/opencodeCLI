<svg xmlns="http://www.w3.org/2000/svg" width="200" height="120" viewBox="0 0 200 120">
  <rect x="10" y="10" width="180" height="100" rx="8" fill="var(--vscode-editor-background)" stroke="var(--vscode-widget-border)" stroke-width="1.5"/>
  <rect x="10" y="10" width="180" height="24" rx="8" fill="var(--vscode-titleBar-activeBackground)"/>
  <circle cx="24" cy="22" r="4" fill="var(--vscode-errorForeground)"/>
  <circle cx="36" cy="22" r="4" fill="var(--vscode-editorWarning-foreground)"/>
  <circle cx="48" cy="22" r="4" fill="var(--vscode-debugIcon-startForeground)"/>
  <text x="70" y="27" font-size="10" fill="var(--vscode-titleBar-activeForeground)" font-family="monospace" opacity="0.7">hello.py</text>
  <text x="20" y="50" font-size="11" fill="var(--vscode-keybindingLabel-foreground)" font-family="monospace">#!/usr/bin/env python3</text>
  <text x="20" y="66" font-size="11" fill="var(--vscode-editor-foreground)" font-family="monospace">print("Hello, OpenCode!")</text>
  <text x="20" y="82" font-size="11" fill="var(--vscode-editor-foreground)" font-family="monospace">for i in range(3):</text>
  <text x="36" y="98" font-size="11" fill="var(--vscode-editor-foreground)" font-family="monospace">print(f"Count {i}")</text>
</svg>
