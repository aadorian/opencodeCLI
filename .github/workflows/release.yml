name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build, publish release, and marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest
        run: npm run validate

      - name: Run tests
        run: xvfb-run -a npm test

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Extract version from tag
        id: version
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::warning::VSCE_PAT secret not set — skipping Marketplace publish"
            exit 0
          fi
          npx @vscode/vsce publish --no-dependencies -p "$VSCE_PAT"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::warning::OVSX_PAT secret not set — skipping Open VSX publish"
            exit 0
          fi
          npx ovsx publish "opencode-walkthrough-${{ steps.version.outputs.tag }}.vsix" -p "$OVSX_PAT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: OpenCode Walkthrough v${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: '*.vsix'
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
