name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, publish release, and marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
        id: version

      - name: Validate manifest and publish prerequisites
        run: npm run validate

      - name: Run tests
        run: xvfb-run -a npm test

      - name: Package VSIX
        run: npx @vscode/vsce@3 package --no-dependencies

      - name: Resolve pre-release flag
        id: prerelease
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          FLAG=$(node -e "const { shouldPublishPreRelease } = require('./lib/publishCicd'); console.log(shouldPublishPreRelease(process.env.GITHUB_REF_NAME, require('./package.json').preview))")
          echo "publish_prerelease=$FLAG" >> "$GITHUB_OUTPUT"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "::warning::VSCE_PAT secret not set — skipping Marketplace publish"
            exit 0
          fi
          VSIX="opencode-walkthrough-${{ steps.version.outputs.version }}.vsix"
          ARGS=(publish --no-dependencies -p "$VSCE_PAT" --packagePath "$VSIX")
          if [ "${{ steps.prerelease.outputs.publish_prerelease }}" = "true" ]; then
            ARGS+=(--pre-release)
          fi
          npx @vscode/vsce@3 "${ARGS[@]}"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::warning::OVSX_PAT secret not set — skipping Open VSX publish"
            exit 0
          fi
          npx ovsx publish "opencode-walkthrough-${{ steps.version.outputs.version }}.vsix" -p "$OVSX_PAT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: OpenCode Walkthrough v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: '*.vsix'
          draft: false
          prerelease: ${{ steps.prerelease.outputs.publish_prerelease == 'true' }}
