name: Sync Wiki

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'docs/**'
      - 'scripts/sync-wiki.js'
      - '.github/workflows/sync-wiki.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare wiki files
        run: node scripts/sync-wiki.js

      - name: Push to GitHub Wiki
        id: push
        continue-on-error: true
        env:
          WIKI_DIR: .wiki-sync
        run: |
          cd "$WIKI_DIR"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b master
          git add .
          git commit -m "docs: sync wiki from docs/"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"
          git push -u origin master --force

      - name: Verify wiki pages
        run: node scripts/verify-wiki.js
