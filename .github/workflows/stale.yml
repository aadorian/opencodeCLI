name: Stale

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest
    steps:
      - name: Run stale bot
        uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'good first issue,pinned,security'
          exempt-pr-labels: 'pinned,security'
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. Comment to keep it open.
          stale-pr-message: >
            This pull request has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. Push new commits or comment to keep it open.
          close-issue-message: >
            Closed due to inactivity. Reopen or create a new issue if this is still relevant.
          close-pr-message: >
            Closed due to inactivity. Feel free to reopen or submit a fresh PR.
