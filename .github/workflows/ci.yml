name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate manifest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate extension manifest
        run: npm run validate

  test:
    name: Extension tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Run tests (macOS)
        if: runner.os != 'Linux'
        run: npm test

  package:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npx @vscode/vsce@3 package --no-dependencies

      - name: Verify VSIX artifact name
        run: |
          VSIX="opencode-walkthrough-$(node -p "require('./package.json').version").vsix"
          if [ ! -f "$VSIX" ]; then
            echo "::error::Expected VSIX not found: $VSIX"
            ls -la *.vsix || true
            exit 1
          fi
          echo "Packaged $VSIX"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode-walkthrough-vsix
          path: "opencode-walkthrough-*.vsix"
          retention-days: 14
          if-no-files-found: error
